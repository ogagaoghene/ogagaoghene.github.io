<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Currency Converter Web Application</title>
         <!-- Bootstrap CSS served locally -->
         <link href="css/bootstrap.min.css" rel="stylesheet">
         <link href="css/bootstrap-theme.min.css" rel="stylesheet">
         <link href="css/include.css" rel="stylesheet" type="text/css">
    </head>
    <body id>
        <p id="page-header"></p>
        <!-- container -->
      <div class="container-fluid">
            <!-- Bootstrap centered form starts here -->
            <div class="row centered-form">
              <div class="col-xs-12 col-sm-8 col-md-4 col-sm-offset-2 col-md-offset-4">
                <div class="panel panel-primary menu">
                  <div class="panel-heading">
                    <h3 class="panel-title">Currency Converter </h3>
                  </div>
                  <div class="panel-body">
                    <form name="form" role="form" method="post" action="">
                        <label for="amount">Enter Amount: </label>
                      <div class="form-group">
                        <input type="text"value="1" name="amount" id="amount" class="form-control input-sm" placeholder="Enter Amount">
                      </div>
                        <div> <label for="curr_from">From: </label></div>
                      <div class="form-group">
                            <select id="currency_from" class="form-control input-sm" >
                            </select>
                        </div>
                            <div><label for="to">To: </label></div>
                        <div class="form-group">
                            <select id="currency_to" class="form-control input-sm" ></select>
                      </div>
                      <input type="submit" value="Convert Currencies" class="btn btn-primary btn-block" name="bttn_convert">
                      <div>&nbsp;</div>
                        <div class="form-group">
                            <input type="text" readonly name="currency_val" id="currency_val" class="form-control input-sm" placeholder="Display currency value" >
                        </div>
                    </form>
                  </div>
                </div>
                </div>
              </div>
            </div>
        <script src="../js/main.js" type="text/javascript" charset="utf-8"></script>
        <script src="../js/app.js" ></script>
    </body>
    
</html>
